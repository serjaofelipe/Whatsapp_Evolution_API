<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Gateway - QR Code</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #f8fafc;
            --accent: #3b82f6;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.3) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .glass-panel:hover {
            box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.3);
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 700; }
        p { font-size: 0.875rem; color: #94a3b8; margin-bottom: 2rem; }
        .qr-container {
            background: white;
            padding: 1rem;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 1.5rem;
            min-height: 250px;
            min-width: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qr-container img { max-width: 100%; border-radius: 8px; }
        .status { display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.875rem; font-weight: 500; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .status-dot.connected { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-dot.connecting { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; margin-top: 1rem; display: none; transition: background 0.2s; width: 100%; }
        .btn-logout:hover { background: #dc2626; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h1>Atlas Gateway</h1>
        <p>Conecte seu WhatsApp lendo o QR Code abaixo</p>
        <div class="qr-container" id="qr-box">
            <div class="loader" id="loader"></div>
            <img id="qr-image" src="" alt="QR Code" style="display: none;">
        </div>
        <div class="status">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Aguardando Conexão API...</span>
        </div>
        <button class="btn-logout" id="btn-logout" onclick="logout()">Desconectar Conta</button>
    </div>
    <script>
        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                const state = data?.instance?.state || data?.state;
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');
                const btnLogout = document.getElementById('btn-logout');
                if (state === 'open') {
                    dot.className = 'status-dot connected';
                    text.innerText = 'Conectado (Online)';
                    const loader = document.getElementById('loader');
                    const qrImage = document.getElementById('qr-image');
                    if(loader) loader.style.display = 'none';
                    if(qrImage) { qrImage.style.display = 'none'; qrImage.parentElement.innerHTML = '<h2 style="color: black;">WhatsApp Conectado!</h2>'; }
                    btnLogout.style.display = 'block';
                } else if (state === 'connecting') {
                    dot.className = 'status-dot connecting';
                    text.innerText = 'Conectando...';
                    btnLogout.style.display = 'none';
                    fetchQR();
                } else {
                    dot.className = 'status-dot';
                    text.innerText = 'Aguardando QR Code...';
                    btnLogout.style.display = 'none';
                    fetchQR();
                }
            } catch (err) {
                console.error(err);
                document.getElementById('status-text').innerText = 'Erro ao conectar à API (Evolution Offline?)';
            }
        }
        async function fetchQR() {
            try {
                const response = await fetch('/api/qr');
                const data = await response.json();
                if (data.base64) {
                    const loader = document.getElementById('loader');
                    if (loader) loader.style.display = 'none';
                    let qrImg = document.getElementById('qr-image');
                    if (!qrImg) {
                        const qrBox = document.getElementById('qr-box');
                        qrBox.innerHTML = '<div class="loader" id="loader" style="display:none;"></div><img id="qr-image" src="" alt="QR Code">';
                        qrImg = document.getElementById('qr-image');
                    }
                    qrImg.src = data.base64;
                    qrImg.style.display = 'block';
                }
            } catch (err) { console.error("Erro ao buscar QR:", err); }
        }
        async function logout() {
            if(!confirm("Tem certeza que deseja desconectar o WhatsApp atual?")) return;
            const btn = document.getElementById('btn-logout');
            btn.innerText = "Desconectando...";
            btn.disabled = true;
            try {
                await fetch('/api/logout', { method: 'POST' });
                setTimeout(() => { window.location.reload(); }, 1500);
            } catch(e) {
                alert("Erro ao desconectar!");
                btn.innerText = "Desconectar Conta";
                btn.disabled = false;
            }
        }
        setInterval(checkStatus, 5000);
        checkStatus();
    </script>
</body>
</html>
